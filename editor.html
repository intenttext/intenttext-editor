<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntentText Editor</title>
    <meta
      name="description"
      content="A professional WYSIWYG editor for IntentText (.it) documents."
    />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Inline critical styles — prevent FOUC */
      .it-app {
        opacity: 0;
      }
      .it-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1e1e2e;
        color: #cdd6f4;
        font-family: Inter, system-ui, sans-serif;
        font-size: 14px;
        gap: 10px;
      }
      .it-loading-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #313244;
        border-top-color: #cba6f7;
        border-radius: 50%;
        animation: it-spin 0.6s linear infinite;
      }
      @keyframes it-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .it-app.ready {
        opacity: 1;
        transition: opacity 0.15s ease-in;
      }
      .it-loading.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen shown until CSS/JS hydrate -->
    <div class="it-loading" id="app-loading">
      <div class="it-loading-spinner"></div>
      <span>Loading IntentText Editor…</span>
    </div>
    <div class="it-app" id="it-app">
      <!-- ── Unified Toolbar ──────────────────────────────── -->
      <header class="it-toolbar-unified">
        <!-- Left: Logo + File ops + Templates + unsaved indicator -->
        <div class="it-toolbar__left">
          <div class="it-header__logo">Intent<span>Text</span></div>
          <span class="it-toolbar-sep-v"></span>
          <button class="it-btn it-btn--sm" id="btn-new" title="New (Ctrl+N)">
            <svg
              width="14"
              height="14"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M3 1h7l3 3v11H3V1z" />
              <path d="M10 1v3h3" />
            </svg>
          </button>
          <button class="it-btn it-btn--sm" id="btn-open" title="Open (Ctrl+O)">
            <svg
              width="14"
              height="14"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M2 4h4l1.5-2H14v10H2V4z" />
            </svg>
          </button>
          <button class="it-btn it-btn--sm" id="btn-save" title="Save (Ctrl+S)">
            <svg
              width="14"
              height="14"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M12 15H4a1 1 0 01-1-1V2a1 1 0 011-1h6l3 3v10a1 1 0 01-1 1z"
              />
              <path d="M10 1v3h3M5 10h6M5 12.5h4" />
            </svg>
          </button>
          <div class="it-dropdown" id="export-dropdown">
            <button class="it-btn it-btn--sm" id="btn-export" title="Export">
              <svg
                width="14"
                height="14"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path d="M8 2v8M5 7l3 3 3-3M3 12v2h10v-2" />
              </svg>
              <span class="it-btn__caret">▾</span>
            </button>
            <div class="it-dropdown__menu" id="export-menu">
              <button class="it-dropdown__item" data-export="it">
                Download .it
              </button>
              <button class="it-dropdown__item" data-export="json">
                Download JSON
              </button>
              <button class="it-dropdown__item" data-export="html">
                Download HTML
              </button>
              <button class="it-dropdown__item" data-export="print">
                Download Print HTML
              </button>
              <div class="it-dropdown__divider"></div>
              <button class="it-dropdown__item" data-export="copy-it">
                Copy .it to clipboard
              </button>
              <button class="it-dropdown__item" data-export="copy-json">
                Copy JSON to clipboard
              </button>
              <div class="it-dropdown__divider"></div>
              <button class="it-dropdown__item" data-export="pdf">
                Print / PDF
              </button>
            </div>
          </div>
          <span class="it-toolbar-sep-v"></span>
          <div class="it-dropdown" id="template-dropdown">
            <button
              class="it-btn it-btn--sm"
              id="btn-template"
              title="Templates"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <rect x="2" y="1" width="12" height="14" rx="1" />
                <path d="M5 4h6M5 7h6M5 10h4" />
              </svg>
              Templates ▾
            </button>
            <div
              class="it-dropdown__menu it-dropdown__menu--wide"
              id="template-menu"
            ></div>
          </div>
          <!-- Inline unsaved/restore indicator (Google Docs style) -->
          <span
            class="it-unsaved-dot hidden"
            id="unsaved-dot"
            title="Unsaved changes"
            >●</span
          >
          <span class="it-restore-inline hidden" id="restore-inline">
            <span class="restore-text">💾 Unsaved doc</span>
            <button class="restore-yes">Restore</button>
            <button class="restore-no">✕</button>
          </span>
        </div>

        <!-- Center: Format tools (edit-tab only) -->
        <div class="it-toolbar__center" id="toolbar-format-group">
          <button
            class="it-btn it-btn--tool"
            data-action="add-block"
            title="Add block below"
          >
            +
          </button>
          <span class="it-toolbar-sep-v"></span>
          <!-- Common block types as inline buttons -->
          <button
            class="it-btn it-btn--type"
            data-type="title"
            title="Title (Ctrl+1)"
          >
            H1
          </button>
          <button
            class="it-btn it-btn--type"
            data-type="section"
            title="Section (Ctrl+2)"
          >
            H2
          </button>
          <button
            class="it-btn it-btn--type"
            data-type="sub"
            title="Subsection (Ctrl+3)"
          >
            H3
          </button>
          <button
            class="it-btn it-btn--type"
            data-type="note"
            title="Paragraph"
          >
            ¶
          </button>
          <button class="it-btn it-btn--type" data-type="task" title="Task">
            ☐
          </button>
          <button class="it-btn it-btn--type" data-type="quote" title="Quote">
            "
          </button>
          <button
            class="it-btn it-btn--type"
            data-type="info"
            title="Info callout"
          >
            ℹ
          </button>
          <button
            class="it-btn it-btn--type"
            data-type="warning"
            title="Warning callout"
          >
            ⚠
          </button>
          <button
            class="it-btn it-btn--type"
            data-type="divider"
            title="Divider"
          >
            ─
          </button>
          <!-- Dropdown for Code/Media + Agentic -->
          <select
            class="it-select it-select--type"
            id="block-type-select"
            title="More block types"
          >
            <option value="" disabled selected>More ▾</option>
            <optgroup label="Code &amp; Media">
              <option value="code">Code</option>
              <option value="image">Image</option>
              <option value="link">Link</option>
            </optgroup>
            <optgroup label="Agentic">
              <option value="step">Step</option>
              <option value="decision">Decision</option>
              <option value="gate">Gate</option>
              <option value="checkpoint">Checkpoint</option>
              <option value="trigger">Trigger</option>
              <option value="call">Call</option>
              <option value="emit">Emit</option>
              <option value="wait">Wait</option>
              <option value="retry">Retry</option>
              <option value="parallel">Parallel</option>
              <option value="handoff">Handoff</option>
              <option value="audit">Audit</option>
            </optgroup>
          </select>
          <span class="it-toolbar-sep-v"></span>
          <!-- Text formatting -->
          <button
            class="it-btn it-btn--tool"
            data-format="bold"
            title="Bold (Ctrl+B)"
          >
            <strong>B</strong>
          </button>
          <button
            class="it-btn it-btn--tool"
            data-format="italic"
            title="Italic (Ctrl+I)"
          >
            <em>I</em>
          </button>
          <button
            class="it-btn it-btn--tool"
            data-format="strike"
            title="Strikethrough"
          >
            <s>S</s>
          </button>
          <button
            class="it-btn it-btn--tool"
            data-format="highlight"
            title="Highlight"
          >
            ^H
          </button>
          <button
            class="it-btn it-btn--tool"
            data-format="code"
            title="Inline code"
          >
            `C`
          </button>
          <button
            class="it-btn it-btn--tool"
            data-format="link"
            title="Link (Ctrl+K)"
          >
            🔗
          </button>
          <button
            class="it-btn it-btn--tool"
            data-format="clear"
            title="Clear formatting"
          >
            ✕
          </button>
          <span class="it-toolbar-sep-v"></span>
          <!-- Text alignment -->
          <button
            class="it-btn it-btn--tool"
            data-align="left"
            title="Align left"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M2 3h12M2 6.5h8M2 10h10M2 13.5h6" />
            </svg>
          </button>
          <button
            class="it-btn it-btn--tool"
            data-align="center"
            title="Align center"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M2 3h12M4 6.5h8M3 10h10M5 13.5h6" />
            </svg>
          </button>
          <button
            class="it-btn it-btn--tool"
            data-align="right"
            title="Align right"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M2 3h12M6 6.5h8M4 10h10M8 13.5h6" />
            </svg>
          </button>
          <span class="it-toolbar-sep-v"></span>
          <!-- Block actions -->
          <button
            class="it-btn it-btn--tool"
            data-action="move-up"
            title="Move up (Alt+↑)"
          >
            ↑
          </button>
          <button
            class="it-btn it-btn--tool"
            data-action="move-down"
            title="Move down (Alt+↓)"
          >
            ↓
          </button>
          <button
            class="it-btn it-btn--tool"
            data-action="delete-block"
            title="Delete block"
          >
            ⌫
          </button>
        </div>

        <!-- Right: Tabs + page view + page size -->
        <div class="it-toolbar__right">
          <div class="it-tab-group">
            <button class="it-tab active" data-tab="edit">Edit</button>
            <button class="it-tab" data-tab="source">Source</button>
            <button class="it-tab" data-tab="json">JSON</button>
            <button class="it-tab" data-tab="print">Print</button>
          </div>
          <span class="it-toolbar-sep-v"></span>
          <select
            class="it-select it-select--page-size"
            id="page-size-select"
            title="Page size"
          >
            <option value="a4">A4</option>
            <option value="a5">A5</option>
            <option value="letter">Letter</option>
            <option value="legal">Legal</option>
            <option value="pos-80mm">POS 80mm</option>
            <option value="pos-58mm">POS 58mm</option>
          </select>
          <span class="it-toolbar-sep-v"></span>
          <div class="it-zoom-controls">
            <button
              class="it-btn it-btn--sm"
              id="zoom-out"
              title="Zoom out (Ctrl+−)"
            >
              −
            </button>
            <button
              class="it-btn it-btn--sm it-zoom-level"
              id="zoom-level"
              title="Reset zoom"
            >
              100%
            </button>
            <button
              class="it-btn it-btn--sm"
              id="zoom-in"
              title="Zoom in (Ctrl++)"
            >
              +
            </button>
          </div>
          <a class="it-header__link" href="convert.html" title="Tools"
            >Tools →</a
          >
        </div>
      </header>

      <!-- ── Content Area (tab panels) ──────────────────── -->
      <div class="it-content">
        <div class="it-tab-panel" id="tab-edit"></div>
        <div class="it-tab-panel hidden" id="tab-source"></div>
        <div class="it-tab-panel hidden" id="tab-json"></div>
        <div class="it-tab-panel hidden" id="tab-print"></div>
      </div>

      <!-- ── Status Bar ─────────────────────────────────── -->
      <footer class="it-statusbar">
        <div class="it-statusbar__left">
          <span id="status-stats">blocks: 0 · words: 0 · lines: 0</span>
        </div>
        <div class="it-statusbar__center">
          <span id="status-page-info"></span>
        </div>
        <div class="it-statusbar__right">
          <span id="status-message"></span>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/editor-main.ts"></script>
  </body>
</html>
